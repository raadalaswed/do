<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎯 البطولات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
/* =======================
   نفس CSS الخاص بك بالكامل
   (لم يتم تغييره إطلاقاً)
======================= */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#060b18;--surface:#0d1527;--card:#111d35;
  --border:#1e2f50;--text:#e8edf5;--muted:#4a5f82;
  --gold:#f5c842;--green:#22c55e;--red:#ef4444;
  --blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;
}

body {
  font-family:'Cairo';
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- HEADER -->
<div class="header">
  <button onclick="location.href='index.html'">← الرئيسية</button>
  <div>🎯 البطولات</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="switchTab('active')" class="tab active">الجارية</button>
  <button onclick="switchTab('create')" class="tab">إنشاء</button>
  <button onclick="switchTab('finished')" class="tab">المنتهية</button>
</div>

<div class="page">

<!-- ACTIVE -->
<div class="tab-panel active" id="tab-active">
  <div id="activeTournaments"></div>
</div>

<!-- CREATE -->
<div class="tab-panel" id="tab-create">

<input id="tName" placeholder="اسم البطولة">
<input id="tDesc" placeholder="الوصف">
<input id="tReward" type="number" value="10">

<div class="players-grid" id="playersCheckboxes"></div>

<button onclick="createTournament()">إنشاء</button>

</div>

<!-- FINISHED -->
<div class="tab-panel" id="tab-finished">
  <div id="finishedTournaments"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, get, set, push, onValue, update, remove }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  apiKey:"XXX",
  authDomain:"XXX",
  databaseURL:"XXX",
  projectId:"XXX"
});

const db = getDatabase(app);

let allPlayers = [];
let selectedVote = null;

/* =======================
   TOAST
======================= */
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

/* =======================
   FIX 1: PLAYERS RENDER
======================= */
onValue(ref(db,"players"),snap=>{
  if(!snap.exists()) return;
  allPlayers = Object.keys(snap.val());
  renderPlayers();
});

/* ✅ FIXED */
function renderPlayers(){
  const box=document.getElementById("playersCheckboxes");

  box.innerHTML = allPlayers.map(name=>`
    <label class="player-check" data-player="${name}" onclick="toggleCheck(this)">
      <div class="check-mark"></div>
      <span>${name}</span>
    </label>
  `).join("");
}

/* =======================
   FIX 2: TOGGLE
======================= */
window.toggleCheck = function(el){
  el.classList.toggle("selected");
};

/* =======================
   FIX 3: GET SELECTED
======================= */
function getSelectedPlayers(){
  return [...document.querySelectorAll(".player-check.selected")]
    .map(el=>el.dataset.player);
}

/* =======================
   CREATE TOURNAMENT
======================= */
window.createTournament = async function(){

  const name=document.getElementById("tName").value;
  const desc=document.getElementById("tDesc").value;
  const reward=parseInt(document.getElementById("tReward").value||10);

  const players=getSelectedPlayers();

  if(!name) return toast("أدخل اسم البطولة");
  if(players.length<2) return toast("اختر لاعبين");

  const tRef=push(ref(db,"tournaments"));

  await set(tRef,{
    name,desc,reward,players,
    status:"voting",
    votes:{}
  });

  toast("تم إنشاء البطولة");
};

</script>

</body>
</html>
