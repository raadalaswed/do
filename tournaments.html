<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎯 البطولات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #060b18;
    --surface:  #0d1527;
    --card:     #111d35;
    --border:   #1e2f50;
    --text:     #e8edf5;
    --muted:    #4a5f82;
    --gold:     #f5c842;
    --green:    #22c55e;
    --red:      #ef4444;
    --blue:     #3b82f6;
    --purple:   #8b5cf6;
    --orange:   #f97316;
  }

  body {
    font-family: 'Cairo', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 40% at 50% -10%, rgba(139,92,246,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 50% 30% at 90% 90%, rgba(249,115,22,0.07) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  .header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 1.8rem 1rem 1.3rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(6,11,24,.99) 0%, rgba(13,21,39,.96) 100%);
  }

  .btn-back {
    position: absolute;
    top: 1.1rem; left: 1rem;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 8px;
    color: #93c5fd;
    font-family: 'Cairo', Arial, sans-serif;
    font-size: 12px;
    padding: 7px 13px;
    cursor: pointer;
  }

  .header-emblem { font-size: 40px; line-height: 1; margin-bottom: 6px; filter: drop-shadow(0 0 16px rgba(139,92,246,0.5)); }
  .header-title  { font-size: clamp(18px,5vw,26px); font-weight: 900; }
  .header-sub    { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* ── Tabs ── */
  .tabs {
    position: relative; z-index: 1;
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .tab {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Cairo', Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .tab.active {
    color: var(--purple);
    border-bottom-color: var(--purple);
  }

  /* ── Page ── */
  .page {
    position: relative; z-index: 1;
    max-width: 640px;
    margin: auto;
    padding: 1rem 0.9rem 4rem;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 15px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .card-hdr {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 11px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-hdr-title { font-size: 13px; font-weight: 700; color: #94a3b8; }
  .card-body { padding: 1rem; }

  /* ── Form Elements ── */
  .form-group { margin-bottom: 12px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo', Arial, sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--purple); }

  /* ── Player Checkboxes ── */
  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }

  .player-check {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .player-check input[type=checkbox] { display: none; }

  .player-check.selected {
    border-color: var(--purple);
    background: rgba(139,92,246,0.1);
  }

  .check-mark {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .player-check.selected .check-mark {
    background: var(--purple);
    border-color: var(--purple);
  }

  .check-mark::after {
    content: '';
    width: 4px; height: 8px;
    border-right: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(45deg);
    margin-top: -2px;
    display: none;
  }

  .player-check.selected .check-mark::after { display: block; }
  .player-check-name { font-size: 12px; font-weight: 700; }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 11px;
    color: white;
    font-family: 'Cairo', Arial, sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(124,58,237,0.25);
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:hover  { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-success {
    padding: 8px 16px;
    background: linear-gradient(135deg, #16a34a, #15803d);
    border: none;
    border-radius: 9px;
    color: white;
    font-family: 'Cairo', Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-success:hover { opacity: 0.85; }

  .btn-danger {
    padding: 8px 14px;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 9px;
    color: #fca5a5;
    font-family: 'Cairo', Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }

  /* ── Tournament Cards ── */
  .tournament-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .tournament-card:hover {
    border-color: var(--purple);
    background: rgba(139,92,246,0.04);
  }

  .tc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }

  .tc-name { font-size: 15px; font-weight: 900; }
  .tc-date { font-size: 10px; color: var(--muted); }

  .tc-status {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
  }

  .status-open     { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.22); }
  .status-voting   { background: rgba(245,200,66,0.12); color: var(--gold); border: 1px solid rgba(245,200,66,0.22); }
  .status-finished { background: rgba(139,92,246,0.12); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.22); }

  .tc-players {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 8px;
  }

  .player-chip {
    padding: 3px 10px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.18);
    border-radius: 20px;
    font-size: 11px;
    color: #93c5fd;
    font-weight: 600;
  }

  .player-chip.winner {
    background: rgba(245,200,66,0.15);
    border-color: rgba(245,200,66,0.3);
    color: var(--gold);
  }

  .tc-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Detail Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6,11,24,0.85);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 1.5rem 1.2rem 2rem;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }

  .modal-title { font-size: 17px; font-weight: 900; }

  .btn-close {
    width: 32px; height: 32px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 50%;
    color: #fca5a5;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Vote Cards ── */
  .vote-section { margin-top: 1rem; }
  .vote-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 10px; }

  .vote-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
  }

  .vote-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .vote-card:hover { border-color: var(--purple); }

  .vote-card.voted {
    border-color: var(--purple);
    background: rgba(139,92,246,0.1);
  }

  .vote-card.correct-vote {
    border-color: var(--green);
    background: rgba(34,197,94,0.1);
  }

  .vote-card.wrong-vote {
    border-color: var(--red);
    background: rgba(239,68,68,0.07);
    opacity: 0.6;
  }

  .vote-player-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .vote-count { font-size: 10px; color: var(--muted); }
  .vote-pct {
    font-size: 20px;
    font-weight: 900;
    color: var(--purple);
    margin-top: 4px;
  }

  /* ── My vote input ── */
  .my-vote-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .my-vote-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.7px; }

  .voter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .voter-select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Cairo', Arial, sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    min-width: 0;
  }

  .voter-select:focus { border-color: var(--purple); }

  /* ── Results ── */
  .result-banner {
    background: linear-gradient(135deg, rgba(245,200,66,0.12), rgba(245,200,66,0.04));
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 13px;
    padding: 14px 18px;
    margin-bottom: 14px;
    text-align: center;
  }

  .result-trophy { font-size: 32px; margin-bottom: 6px; }
  .result-winner { font-size: 17px; font-weight: 900; color: var(--gold); }
  .result-sub    { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .bet-result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(30,47,80,0.4);
    font-size: 13px;
  }
  .bet-result-row:last-child { border-bottom: none; }
  .bet-correct { color: var(--green); font-weight: 700; }
  .bet-wrong   { color: var(--red);   font-weight: 700; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 18px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    z-index: 9999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block; vertical-align: middle; margin-left: 8px;
  }

  /* ── Responsive ── */
  @media (max-width: 380px) {
    .players-grid { grid-template-columns: repeat(2, 1fr); }
    .vote-grid    { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ════════ HEADER ════════ -->
<div class="header">
  <button class="btn-back" onclick="location.href='index.html'">← الرئيسية</button>
  <div class="header-emblem">🎯</div>
  <div class="header-title">البطولات</div>
  <div class="header-sub">بطولات الدومينو والتصويت</div>
</div>

<!-- ════════ TABS ════════ -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('active')">🏟️ الجارية</button>
  <button class="tab" onclick="switchTab('create')">➕ إنشاء</button>
  <button class="tab" onclick="switchTab('finished')">🏆 المنتهية</button>
</div>

<!-- ════════ PAGE ════════ -->
<div class="page">

  <!-- ── Tab: Active Tournaments ── -->
  <div class="tab-panel active" id="tab-active">
    <div style="margin-bottom:12px;"></div>
    <div id="activeTournaments">
      <div class="empty-state">
        <div class="spinner"></div>
        <div class="empty-text" style="margin-top:12px;">جاري التحميل...</div>
      </div>
    </div>
  </div>

  <!-- ── Tab: Create Tournament ── -->
  <div class="tab-panel" id="tab-create">
    <div style="margin-bottom:12px;"></div>

    <div class="card">
      <div class="card-hdr"><span>🏷️</span><span class="card-hdr-title">معلومات البطولة</span></div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">اسم البطولة</label>
          <input class="form-input" id="tName" placeholder="مثال: بطولة رمضان 2025">
        </div>
        <div class="form-group">
          <label class="form-label">وصف (اختياري)</label>
          <input class="form-input" id="tDesc" placeholder="وصف مختصر للبطولة">
        </div>
        <div class="form-group">
          <label class="form-label">نقاط من يتوقع الفائز</label>
          <input class="form-input" id="tReward" type="number" value="10" min="1" max="100">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr"><span>👥</span><span class="card-hdr-title">اختر اللاعبين</span></div>
      <div class="card-body">
        <div class="players-grid" id="playersCheckboxes">
          <div style="color:var(--muted);font-size:13px;padding:8px;">جاري تحميل اللاعبين...</div>
        </div>
      </div>
    </div>

    <button class="btn-primary" onclick="createTournament()">🚀 إنشاء البطولة</button>
  </div>

  <!-- ── Tab: Finished Tournaments ── -->
  <div class="tab-panel" id="tab-finished">
    <div style="margin-bottom:12px;"></div>
    <div id="finishedTournaments">
      <div class="empty-state">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

</div>

<!-- ════════ TOURNAMENT DETAIL MODAL ════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getDatabase, ref, get, set, update, remove, push, onValue
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain:        "garag-system.firebaseapp.com",
  databaseURL:       "https://garag-system-default-rtdb.firebaseio.com",
  projectId:         "garag-system",
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ─── Toast ─── */
function toast(msg, dur = 3000) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}

/* ─────────────────────────────────────────
   TAB SWITCHING
───────────────────────────────────────── */
window.switchTab = function(id) {
  document.querySelectorAll(".tab").forEach((t, i) => {
    const names = ["active","create","finished"];
    t.classList.toggle("active", names[i] === id);
  });
  document.querySelectorAll(".tab-panel").forEach(p => {
    p.classList.toggle("active", p.id === "tab-" + id);
  });
};

/* ─────────────────────────────────────────
   LOAD PLAYERS → CHECKBOXES
───────────────────────────────────────── */
let allPlayers = [];

onValue(ref(db, "players"), (snap) => {
  if (!snap.exists()) return;
  allPlayers = Object.keys(snap.val());
  renderPlayerCheckboxes();
});

function renderPlayerCheckboxes() {
  const container = document.getElementById("playersCheckboxes");
  if (!allPlayers.length) {
    container.innerHTML = `<div style="color:var(--muted);font-size:13px;">لا يوجد لاعبون بعد — أضفهم من لوحة الإدارة</div>`;
    return;
  }

  container.innerHTML = allPlayers.map(name => `
    <label class="player-check" id="chk_${CSS.escape(name)}" onclick="toggleCheck('${name.replace(/'/g,"\\'")}')">
      <input type="checkbox" id="cb_${name}">
      <div class="check-mark"></div>
      <span class="player-check-name">${name}</span>
    </label>
  `).join("");
}

window.toggleCheck = function(name) {
  const el = document.getElementById(`chk_${CSS.escape(name)}`);
  if (el) el.classList.toggle("selected");
};

function getSelectedPlayers() {
  return allPlayers.filter(name => {
    const el = document.getElementById(`chk_${CSS.escape(name)}`);
    return el && el.classList.contains("selected");
  });
}

/* ─────────────────────────────────────────
   CREATE TOURNAMENT
───────────────────────────────────────── */
window.createTournament = async function () {
  const name    = document.getElementById("tName").value.trim();
  const desc    = document.getElementById("tDesc").value.trim();
  const reward  = parseInt(document.getElementById("tReward").value) || 10;
  const players = getSelectedPlayers();

  if (!name)           { toast("⚠️ أدخل اسم البطولة"); return; }
  if (players.length < 2) { toast("⚠️ اختر لاعبين على الأقل"); return; }

  const tRef = push(ref(db, "tournaments"));
  await set(tRef, {
    name,
    desc:      desc || "",
    reward,
    players,
    status:    "voting",   // voting | finished
    votes:     {},
    winner:    null,
    createdAt: new Date().toISOString(),
    createdDate: new Date().toLocaleDateString("ar-IQ")
  });

  // reset form
  document.getElementById("tName").value  = "";
  document.getElementById("tDesc").value  = "";
  document.getElementById("tReward").value = "10";
  document.querySelectorAll(".player-check").forEach(el => el.classList.remove("selected"));

  toast(`✅ تم إنشاء البطولة "${name}"!`);
  window.switchTab("active");
};

/* ─────────────────────────────────────────
   LOAD TOURNAMENTS (REALTIME)
───────────────────────────────────────── */
onValue(ref(db, "tournaments"), (snap) => {
  if (!snap.exists()) {
    renderEmpty("activeTournaments");
    renderEmpty("finishedTournaments");
    return;
  }

  const data = snap.val();
  const ids  = Object.keys(data);

  const active   = ids.filter(id => data[id].status !== "finished");
  const finished = ids.filter(id => data[id].status === "finished");

  // Render Active
  if (active.length === 0) {
    renderEmpty("activeTournaments", "لا توجد بطولات جارية حالياً");
  } else {
    document.getElementById("activeTournaments").innerHTML =
      active.map(id => renderTCard(id, data[id])).join("");
  }

  // Render Finished
  if (finished.length === 0) {
    renderEmpty("finishedTournaments", "لا توجد بطولات منتهية بعد");
  } else {
    document.getElementById("finishedTournaments").innerHTML =
      finished.map(id => renderTCard(id, data[id])).join("");
  }
});

function renderEmpty(containerId, msg = "لا يوجد شيء هنا بعد") {
  document.getElementById(containerId).innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🎯</div>
      <div class="empty-text">${msg}</div>
    </div>`;
}

function renderTCard(id, t) {
  const status = t.status === "finished"
    ? `<span class="tc-status status-finished">منتهية 🏆</span>`
    : `<span class="tc-status status-voting">تصويت مفتوح 🗳️</span>`;

  const totalVotes = t.votes ? Object.keys(t.votes).length : 0;
  const winnerChip = t.winner
    ? `<span class="player-chip winner">🏆 ${t.winner}</span>`
    : "";

  const playerChips = (t.players || [])
    .map(p => `<span class="player-chip${t.winner === p ? " winner" : ""}">${t.winner === p ? "🏆 " : ""}${p}</span>`)
    .join("");

  return `
    <div class="tournament-card" onclick="openTournament('${id}')">
      <div class="tc-header">
        <div class="tc-name">${t.name}</div>
        ${status}
      </div>
      <div class="tc-players">${playerChips}</div>
      <div class="tc-footer">
        <span>🗳️ ${totalVotes} صوت</span>
        <span>🎁 ${t.reward || 10} نقطة</span>
        <span style="font-size:9px;">${t.createdDate || ""}</span>
      </div>
    </div>`;
}

/* ─────────────────────────────────────────
   OPEN TOURNAMENT MODAL
───────────────────────────────────────── */
window.openTournament = async function (id) {
  const snap = await get(ref(db, `tournaments/${id}`));
  if (!snap.exists()) return;

  const t = snap.val();
  document.getElementById("modalTitle").textContent = t.name;

  let html = "";

  // Description
  if (t.desc) {
    html += `<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">${t.desc}</div>`;
  }

  // ── FINISHED ──
  if (t.status === "finished") {
    html += renderFinishedModal(t);
  }
  // ── VOTING ──
  else {
    html += renderVotingModal(id, t);
  }

  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("open");
};

function renderFinishedModal(t) {
  const votes     = t.votes || {};
  const voteCounts = countVotes(votes, t.players);
  const total     = Object.values(votes).length;

  let html = `
    <div class="result-banner">
      <div class="result-trophy">🏆</div>
      <div class="result-winner">${t.winner}</div>
      <div class="result-sub">الفائز الرسمي بالبطولة</div>
    </div>`;

  // Vote breakdown
  html += `<div class="vote-title">توزيع الأصوات</div>
    <div class="vote-grid">`;

  (t.players || []).forEach(p => {
    const cnt = voteCounts[p] || 0;
    const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    const isWinner = p === t.winner;
    html += `
      <div class="vote-card" style="${isWinner ? "border-color:var(--gold);background:rgba(245,200,66,0.08);" : ""}">
        <div class="vote-player-name">${isWinner ? "🏆 " : ""}${p}</div>
        <div class="vote-pct" style="${isWinner ? "color:var(--gold);" : ""}">${pct}%</div>
        <div class="vote-count">${cnt} صوت</div>
      </div>`;
  });

  html += `</div>`;

  // Bet results
  if (Object.keys(votes).length > 0) {
    html += `<div class="vote-title">نتائج الرهانات</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;">`;

    for (let [voter, pickedPlayer] of Object.entries(votes)) {
      const correct = pickedPlayer === t.winner;
      html += `
        <div class="bet-result-row">
          <span style="font-weight:700;">${voter}</span>
          <span style="font-size:11px;color:var(--muted);">← ${pickedPlayer}</span>
          <span class="${correct ? "bet-correct" : "bet-wrong"}">
            ${correct ? `+${t.reward || 10} نقطة ✅` : "خطأ ❌"}
          </span>
        </div>`;
    }

    html += `</div>`;
  }

  return html;
}

function renderVotingModal(id, t) {
  const votes     = t.votes || {};
  const voteCounts = countVotes(votes, t.players);
  const total     = Object.values(votes).length;

  let html = `
    <div class="my-vote-wrap">
      <div class="my-vote-label">🗳️ ضع تصويتك — اختر اسمك والفائز المتوقع</div>
      <div class="voter-row">
        <select class="voter-select" id="voterName">
          <option value="">أنا: اختر اسمك</option>
          ${allPlayers.map(p => `<option value="${p}">${p}</option>`).join("")}
        </select>
      </div>
      <div class="vote-title" style="margin-top:4px;">اختر الفائز المتوقع:</div>
      <div class="vote-grid" id="voteGrid">`;

  (t.players || []).forEach(p => {
    const cnt = voteCounts[p] || 0;
    const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    html += `
      <div class="vote-card" id="vc_${p}" onclick="selectVote('${p.replace(/'/g,"\\'")}')">
        <div class="vote-player-name">${p}</div>
        <div class="vote-pct">${pct}%</div>
        <div class="vote-count">${cnt} صوت</div>
      </div>`;
  });

  html += `</div>
      <button class="btn-primary" onclick="submitVote('${id}')">✅ تأكيد التصويت</button>
    </div>`;

  // Live votes display
  if (total > 0) {
    html += `<div class="vote-title">الأصوات الحالية (${total} صوت)</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;">`;

    for (let [voter, picked] of Object.entries(votes)) {
      html += `
        <div class="bet-result-row">
          <span style="font-weight:700;">${voter}</span>
          <span style="font-size:12px;color:#a5b4fc;">→ ${picked}</span>
        </div>`;
    }

    html += `</div>`;
  }

  // Admin: declare winner
  html += `
    <div class="divider"></div>
    <div class="vote-title">🔑 إنهاء البطولة (إدارة فقط)</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">اختر الفائز الرسمي لإنهاء البطولة وتوزيع النقاط</div>
      <select class="voter-select" id="winnerSelect" style="margin-bottom:10px;width:100%;">
        <option value="">اختر الفائز الرسمي...</option>
        ${(t.players || []).map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
      <button class="btn-success" onclick="finishTournament('${id}', ${JSON.stringify(t).replace(/'/g,"\\'")} )">
        🏁 تحديد الفائز وإنهاء البطولة
      </button>
      <button class="btn-danger" style="margin-right:8px;margin-top:8px;" onclick="deleteTournament('${id}')">
        🗑️ حذف البطولة
      </button>
    </div>`;

  return html;
}

/* ─── Helpers ─── */
let selectedVote = null;

window.selectVote = function(playerName) {
  selectedVote = playerName;
  document.querySelectorAll(".vote-card").forEach(el => el.classList.remove("voted"));
  const el = document.getElementById(`vc_${playerName}`);
  if (el) el.classList.add("voted");
};

function countVotes(votes, players) {
  const counts = {};
  (players || []).forEach(p => counts[p] = 0);
  Object.values(votes).forEach(v => { if (counts[v] !== undefined) counts[v]++; });
  return counts;
}

/* ─────────────────────────────────────────
   SUBMIT VOTE
───────────────────────────────────────── */
window.submitVote = async function(id) {
  const voter = document.getElementById("voterName")?.value;
  if (!voter)       { toast("⚠️ اختر اسمك أولاً"); return; }
  if (!selectedVote){ toast("⚠️ اختر اللاعب المتوقع فوزه"); return; }

  // Check if already voted
  const existingSnap = await get(ref(db, `tournaments/${id}/votes/${voter}`));
  if (existingSnap.exists()) {
    toast(`⚠️ ${voter} صوّت مسبقاً على "${existingSnap.val()}"`);
    return;
  }

  await set(ref(db, `tournaments/${id}/votes/${voter}`), selectedVote);
  toast(`✅ تم تسجيل تصويت ${voter} على "${selectedVote}"`);
  selectedVote = null;

  // Refresh modal
  closeModal();
  setTimeout(() => openTournament(id), 300);
};

/* ─────────────────────────────────────────
   FINISH TOURNAMENT
   ✅ توزيع النقاط على من اختار الفائز
───────────────────────────────────────── */
window.finishTournament = async function(id) {
  const winner = document.getElementById("winnerSelect")?.value;
  if (!winner) { toast("⚠️ اختر الفائز الرسمي"); return; }

  if (!confirm(`تأكيد إنهاء البطولة بفائز: ${winner}؟\nسيتم توزيع النقاط على من توقع الفوز.`)) return;

  const snap = await get(ref(db, `tournaments/${id}`));
  if (!snap.exists()) return;

  const t      = snap.val();
  const votes  = t.votes || {};
  const reward = t.reward || 10;

  // حساب الفائزين بالرهان
  const updates = {};
  const winners = [];

  for (let [voter, picked] of Object.entries(votes)) {
    if (picked === winner) {
      winners.push(voter);
      // أضف نقاط للاعب الذي توقع صح
      const playerSnap = await get(ref(db, `players/${voter}`));
      if (playerSnap.exists()) {
        const curPts = playerSnap.val().points || 0;
        const newPts = curPts + reward;
        updates[`players/${voter}/points`] = newPts;
        updates[`players/${voter}/league`] = getLeague(newPts);
      }
    }
  }

  // تحديث البطولة
  updates[`tournaments/${id}/status`]     = "finished";
  updates[`tournaments/${id}/winner`]     = winner;
  updates[`tournaments/${id}/finishedAt`] = new Date().toISOString();
  updates[`tournaments/${id}/finishedDate`] = new Date().toLocaleDateString("ar-IQ");
  updates[`tournaments/${id}/betWinners`] = winners;

  await update(ref(db), updates);

  const msg = winners.length > 0
    ? `🏆 انتهت البطولة! الفائز: ${winner}\n🎁 حصل ${winners.join("، ")} على ${reward} نقطة`
    : `🏆 انتهت البطولة! الفائز: ${winner}\n😅 لا أحد توقع الفوز`;

  toast(msg, 4000);
  closeModal();
  setTimeout(() => openTournament(id), 400);
};

/* ─── Delete Tournament ─── */
window.deleteTournament = async function(id) {
  if (!confirm("حذف هذه البطولة نهائياً؟")) return;
  await remove(ref(db, `tournaments/${id}`));
  toast("🗑️ تم حذف البطولة");
  closeModal();
};

/* ─── Modal ─── */
window.closeModal = function(e) {
  if (e && e.target !== document.getElementById("modalOverlay")) return;
  document.getElementById("modalOverlay").classList.remove("open");
  selectedVote = null;
};

/* ─── getLeague ─── */
function getLeague(p) {
  if (p >= 300) return 1;
  if (p >= 200) return 2;
  if (p >= 120) return 3;
  if (p >= 60)  return 4;
  return 5;
}
</script>
