<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 دوري الدومينو</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
    border-bottom: 1px solid #1e293b;
    padding: 2rem 1rem 1.5rem;
    text-align: center;
  }

  .header-title {
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 6px;
  }

  .header-sub { font-size: 13px; color: #475569; }

  /* ── Season Badge ── */
  .season-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(234,179,8,0.1);
    border: 1px solid rgba(234,179,8,0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: #fbbf24;
    margin-top: 8px;
  }

  .season-badge .dot {
    width: 6px; height: 6px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(1.3); }
  }

  .actions {
    display: flex;
    gap: 10px;
    padding: 1.2rem 1rem;
    max-width: 600px;
    margin: auto;
  }

  .btn {
    flex: 1;
    padding: 13px 8px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: white;
    font-size: clamp(12px, 3.5vw, 14px);
    font-weight: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    transition: transform 0.15s, opacity 0.15s;
  }

  .btn:active { transform: scale(0.96); opacity: 0.85; }
  .btn-icon { font-size: 20px; }
  .btn-green  { background: linear-gradient(135deg, #16a34a, #15803d); }
  .btn-blue   { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
  .btn-amber  { background: linear-gradient(135deg, #d97706, #b45309); }

  .page { max-width: 600px; margin: auto; padding: 0 1rem 3rem; }

  .section-title {
    font-size: 13px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 1.2rem 0 8px;
  }

  .leagues-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .league-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
  }

  .league-card .l-icon { font-size: 18px; margin-bottom: 4px; }
  .league-card .l-num  { font-size: 12px; font-weight: 700; color: #f1f5f9; margin-bottom: 2px; }
  .league-card .l-pts  { font-size: 10px; color: #64748b; line-height: 1.3; }

  .table-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    overflow: hidden;
  }

  .table-header {
    background: #020617;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #334155;
  }

  .table-header-title { font-size: 14px; font-weight: 600; color: #94a3b8; }

  .live-dot {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: auto;
    animation: pulse 2s infinite;
  }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { width: 100%; border-collapse: collapse; min-width: 340px; }
  thead tr { background: #0f172a; }

  th {
    padding: 10px 12px;
    font-size: 11px;
    color: #475569;
    font-weight: 500;
    text-align: right;
    white-space: nowrap;
    border-bottom: 1px solid #334155;
  }

  td {
    padding: 11px 12px;
    font-size: 13px;
    border-bottom: 1px solid #1a2640;
    color: #cbd5e1;
    white-space: nowrap;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover td { background: rgba(255,255,255,0.03); }

  .row-top td { background: rgba(5,150,105,0.12); }
  .row-top:hover td { background: rgba(5,150,105,0.18) !important; }
  .row-bottom td { background: rgba(127,29,29,0.15); }
  .row-bottom:hover td { background: rgba(127,29,29,0.22) !important; }

  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  .rank-1 { background: rgba(234,179,8,0.2);  color: #fbbf24; }
  .rank-2 { background: rgba(148,163,184,0.2); color: #94a3b8; }
  .rank-3 { background: rgba(180,83,9,0.2);    color: #f97316; }
  .rank-n { background: rgba(51,65,85,0.5);    color: #64748b; }

  a { color: #f1f5f9; text-decoration: none; font-weight: 600; font-size: 14px; }
  a:hover { color: #60a5fa; }

  .win    { color: #22c55e; font-weight: 600; }
  .loss   { color: #ef4444; font-weight: 600; }
  .streak { color: #f97316; font-weight: 600; }

  .league-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(99,102,241,0.15);
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.25);
  }

  /* ── Season Ended Banner ── */
  .season-ended-banner {
    background: rgba(234,179,8,0.08);
    border: 1px solid rgba(234,179,8,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #fbbf24;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🏆 دوري الدومينو</div>
  <div class="header-sub">جدول الترتيب المباشر</div>
  <div class="season-badge">
    <div class="dot"></div>
    <span id="seasonLabel">جاري التحميل...</span>
  </div>
</div>

<div class="actions">
  <button class="btn btn-green" onclick="goToAddMatch()">
    <span class="btn-icon">➕</span> إضافة مباراة
  </button>
  <button class="btn btn-blue" onclick="goToStats()">
    <span class="btn-icon">📊</span> الإحصائيات
  </button>
  <button class="btn btn-amber" onclick="goToAdmin()">
    <span class="btn-icon">🧑‍💻</span> الإدارة
  </button>
</div>

<div class="page">

  <div id="seasonEndedBanner" style="display:none;" class="season-ended-banner">
    🏁 انتهى الموسم الحالي — انتظر بدء الموسم الجديد من لوحة الإدارة
  </div>

  <div class="section-title">مستويات الدوري</div>
  <div class="leagues-grid">
    <div class="league-card">
      <div class="l-icon">🥇</div>
      <div class="l-num">الأول</div>
      <div class="l-pts">300+</div>
    </div>
    <div class="league-card">
      <div class="l-icon">🥈</div>
      <div class="l-num">الثاني</div>
      <div class="l-pts">200–299</div>
    </div>
    <div class="league-card">
      <div class="l-icon">🥉</div>
      <div class="l-num">الثالث</div>
      <div class="l-pts">120–199</div>
    </div>
    <div class="league-card">
      <div class="l-icon">4️⃣</div>
      <div class="l-num">الرابع</div>
      <div class="l-pts">60–119</div>
    </div>
    <div class="league-card">
      <div class="l-icon">5️⃣</div>
      <div class="l-num">الخامس</div>
      <div class="l-pts">أقل من 60</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <span class="table-header-title">📊 جدول الترتيب</span>
      <div class="live-dot" title="يتحدث كل 10 ثوانٍ"></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>اللاعب</th>
            <th>النقاط</th>
            <th>الدوري</th>
            <th>فوز</th>
            <th>خسارة</th>
            <th>🔥</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getDatabase, ref, get, set, update
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain: "garag-system.firebaseapp.com",
  databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
  projectId: "garag-system",
  storageBucket: "garag-system.firebasestorage.app",
  messagingSenderId: "330947022055",
  appId: "1:330947022055:web:ce96293502f40d2645a642"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ─────────────────────────────────────────
   مساعدات
───────────────────────────────────────── */
function getLeague(points) {
  if (points >= 300) return 1;
  if (points >= 200) return 2;
  if (points >= 120) return 3;
  if (points >= 60)  return 4;
  return 5;
}

function rankBadge(i) {
  if (i === 0) return `<span class="rank-badge rank-1">🥇</span>`;
  if (i === 1) return `<span class="rank-badge rank-2">🥈</span>`;
  if (i === 2) return `<span class="rank-badge rank-3">🥉</span>`;
  return `<span class="rank-badge rank-n">${i + 1}</span>`;
}

/* ─────────────────────────────────────────
   إنهاء الموسم (آمنة من التكرار)
   ✅ تعمل فقط يوم الجمعة
   ✅ تتحقق من seasonEnded قبل التنفيذ
   ✅ تضع seasonEnded=true بعد التنفيذ
───────────────────────────────────────── */
async function checkSeasonEnd() {
  // 1) تحقق من اليوم أولاً (الجمعة = 5)
  const today = new Date();
  if (today.getDay() !== 5) return;

  // 2) اقرأ حالة الموسم من Firebase
  const metaSnap = await get(ref(db, "seasonMeta"));
  const meta     = metaSnap.exists() ? metaSnap.val() : {};

  // 3) إذا انتهى الموسم مسبقاً → لا تفعل شيئاً
  if (meta.seasonEnded === true) return;

  // 4) اقرأ اللاعبين
  const playersSnap = await get(ref(db, "players"));
  if (!playersSnap.exists()) return;

  let list = Object.entries(playersSnap.val())
    .map(([name, data]) => ({ name, ...data }))
    .sort((a, b) => b.points - a.points);

  if (list.length < 4) return; // لا يكفي للترتيب

  // 5) أرشفة الموسم أولاً
  const seasonNumber = (meta.seasonNumber || 0) + 1;
  const seasonId     = `season_${seasonNumber}`;
  const top10 = list.slice(0, 10).map(p => ({
    name:   p.name,
    points: p.points,
    league: getLeague(p.points),
    wins:   p.wins   || 0,
    losses: p.losses || 0,
    streak: p.streak || 0
  }));

  await set(ref(db, `seasons/${seasonId}`), {
    seasonNumber,
    winner:      list[0].name,
    winnerPoints: list[0].points,
    top10,
    endedAt: new Date().toISOString(),
    endedDate: today.toLocaleDateString("ar-IQ")
  });

  // 6) تحديث نقاط اللاعبين (مرة واحدة فقط)
  const updates = {};
  list[0].points += 20;
  list[1].points += 10;
  list[list.length - 2].points -= 10;
  list[list.length - 1].points -= 20;

  for (let p of list) {
    // لا تسمح بنقاط سالبة
    p.points = Math.max(0, p.points);
    updates[`players/${p.name}/points`] = p.points;
    updates[`players/${p.name}/league`] = getLeague(p.points);
  }

  // 7) ضع seasonEnded = true في نفس العملية
  updates["seasonMeta/seasonEnded"]  = true;
  updates["seasonMeta/seasonNumber"] = seasonNumber;
  updates["seasonMeta/lastEndDate"]  = today.toISOString();

  await update(ref(db), updates);

  console.log(`✅ انتهى الموسم ${seasonNumber} بنجاح`);
}

/* ─────────────────────────────────────────
   تحميل اللاعبين وعرضهم
───────────────────────────────────────── */
async function loadPlayers() {
  // تشغيل checkSeasonEnd بشكل منفصل (لا يوقف العرض إذا فشل)
  checkSeasonEnd().catch(err => console.warn("checkSeasonEnd error:", err));

  // اقرأ seasonMeta لعرض شارة الموسم
  const metaSnap = await get(ref(db, "seasonMeta"));
  const meta = metaSnap.exists() ? metaSnap.val() : {};

  const seasonNum = meta.seasonNumber || 1;
  document.getElementById("seasonLabel").textContent =
    `الموسم ${seasonNum}${meta.seasonEnded ? " — انتهى" : " — جارٍ"}`;

  // عرض/إخفاء بانر انتهاء الموسم
  document.getElementById("seasonEndedBanner").style.display =
    meta.seasonEnded ? "flex" : "none";

  // اقرأ اللاعبين
  const snapshot = await get(ref(db, "players"));
  if (!snapshot.exists()) {
    document.getElementById("table").innerHTML =
      `<tr><td colspan="7" style="text-align:center;color:#475569;padding:24px;">لا يوجد لاعبين بعد</td></tr>`;
    return;
  }

  let list = Object.entries(snapshot.val())
    .map(([name, data]) => ({ name, ...data }))
    .sort((a, b) => b.points - a.points);

  let html = "";
  list.forEach((p, i) => {
    let rowClass = "";
    if (i === 0) rowClass = "row-top";
    else if (i >= list.length - 2) rowClass = "row-bottom";

    html += `
      <tr class="${rowClass}">
        <td>${rankBadge(i)}</td>
        <td><a href="player.html?name=${encodeURIComponent(p.name)}">${p.name}</a></td>
        <td style="font-weight:700;color:#f1f5f9;">${p.points}</td>
        <td><span class="league-pill">الدوري ${p.league || getLeague(p.points)}</span></td>
        <td class="win">${p.wins   || 0}</td>
        <td class="loss">${p.losses || 0}</td>
        <td class="streak">${p.streak || 0}</td>
      </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

// تحميل أولي + تحديث كل 10 ثواني (بدلاً من 5 لتخفيف الطلبات)
loadPlayers();
setInterval(loadPlayers, 10000);
</script>

<script>
function goToAddMatch() { window.location.href = "add-match.html"; }
function goToStats()    { window.location.href = "stats.html"; }
function goToAdmin()    { window.location.href = "admin.html"; }
</script>

</body>
</html>
