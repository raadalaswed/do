<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }
.orange { background: #f59e0b; }

.container {
  display: none;
  width: 95%;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #334155;
}

th { background: #020617; }
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2>🔐 دخول الإدارة</h2>
  <input type="password" id="pass">
  <br>
  <button class="green" onclick="login()">دخول</button>
</div>

<!-- 📊 DASHBOARD -->
<div class="container" id="dashboard">

<h2>🧑‍💻 لوحة التحكم</h2>

<button class="red" onclick="logout()">تسجيل خروج</button>

<br><br>

<button class="orange" onclick="endSeason()">🏁 إنهاء الموسم</button>
<button class="blue" onclick="newSeason()">🔄 موسم جديد</button>

<div class="card">
📊 اللاعبين: <span id="playersCount"></span><br>
🏆 الأول: <span id="bestPlayer"></span>
</div>

<!-- ➕ لاعب -->
<div class="card">
<input id="newPlayer" placeholder="اسم لاعب">
<button class="green" onclick="addPlayer()">إضافة</button>
</div>

<!-- 👥 اللاعبين -->
<div class="card">
<h3>اللاعبين</h3>
<table>
<thead>
<tr>
<th>اسم</th>
<th>نقاط</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="playersTable"></tbody>
</table>
</div>

<!-- 📦 المواسم -->
<div class="card">
<h3>📦 المواسم</h3>
<table>
<thead>
<tr>
<th>الموسم</th>
<th>الأول</th>
<th>نقاطه</th>
<th>عرض</th>
</tr>
</thead>
<tbody id="seasonsTable"></tbody>
</table>
</div>

<!-- 🔍 تفاصيل الموسم -->
<div class="card">
<h3>🔍 تفاصيل الموسم</h3>
<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>النقاط</th>
<th>الدوري</th>
<th>فوز</th>
<th>خسارة</th>
</tr>
</thead>
<tbody id="seasonDetails"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain: "garag-system.firebaseapp.com",
  databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
  projectId: "garag-system",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const PASSWORD = "88888888";

// 🔐 Login
window.login = function() {
  if (document.getElementById("pass").value === PASSWORD) {
    localStorage.setItem("admin","1");
    init();
  } else alert("خطأ");
};

window.logout = function() {
  localStorage.removeItem("admin");
  location.reload();
};

if (localStorage.getItem("admin") === "1") init();

function init() {
  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
  loadAll();
}

// 📊 تحميل
async function loadAll(){
  loadPlayers();
  loadSeasons();
}

// 👥 اللاعبين
async function loadPlayers(){
  const snap = await get(ref(db,"players"));
  if(!snap.exists()) return;

  let data = snap.val();
  let html = "";

  let best = "-", bestP = 0;

  for(let n in data){
    let p = data[n];

    if(p.points > bestP){
      bestP = p.points;
      best = n;
    }

    html += `
    <tr>
      <td>${n}</td>
      <td><input id="p_${n}" value="${p.points}"></td>
      <td><button class="blue" onclick="updatePlayer('${n}')">تحديث</button></td>
      <td><button class="red" onclick="deletePlayer('${n}')">حذف</button></td>
    </tr>`;
  }

  document.getElementById("playersTable").innerHTML = html;
  document.getElementById("playersCount").innerText = Object.keys(data).length;
  document.getElementById("bestPlayer").innerText = best;
}

// ➕ لاعب
window.addPlayer = async function(){
  let name = document.getElementById("newPlayer").value;
  if(!name) return;

  await set(ref(db,"players/"+name),{
    points:0,wins:0,losses:0,streak:0,league:5
  });

  loadAll();
};

// ✏️ تحديث
window.updatePlayer = async function(name){
  let val = document.getElementById("p_"+name).value;
  await update(ref(db,"players/"+name),{points:Number(val)});
  loadAll();
};

// 🗑️ حذف
window.deletePlayer = async function(name){
  await remove(ref(db,"players/"+name));
  loadAll();
};

// 🧠 تحديد الدوري
function getLeague(p){
  if(p>=300)return 1;
  if(p>=200)return 2;
  if(p>=120)return 3;
  if(p>=60)return 4;
  return 5;
}

// 🏁 إنهاء الموسم (احترافي)
window.endSeason = async function(){

  const snap = await get(ref(db,"players"));
  if(!snap.exists()) return;

  let data = snap.val();

  let arr = Object.entries(data).map(([n,p])=>({name:n,...p}));

  arr.sort((a,b)=>b.points-a.points);

  // تحديث الدوريات
  for(let p of arr){
    await update(ref(db,"players/"+p.name),{
      league:getLeague(p.points)
    });
  }

  // أفضل 10
  let top10 = arr.slice(0,10).map(p=>({
    name:p.name,
    points:p.points,
    league:getLeague(p.points),
    wins:p.wins||0,
    losses:p.losses||0
  }));

  let seasonId = "Season_"+Date.now();

  await set(ref(db,"seasons/"+seasonId),{
    bestPlayer: arr[0].name,
    bestPoints: arr[0].points,
    top10: top10,
    date: new Date().toLocaleDateString()
  });

  alert("تم إنهاء الموسم 🔥");
  loadAll();
};

// 🔄 موسم جديد
window.newSeason = function(){
  alert("تم بدء موسم جديد");
};

// 📦 تحميل المواسم
async function loadSeasons(){
  const snap = await get(ref(db,"seasons"));
  if(!snap.exists()) return;

  let data = snap.val();
  let html = "";

  for(let id in data){
    let s = data[id];

    html += `
    <tr>
      <td>${id}</td>
      <td>${s.bestPlayer}</td>
      <td>${s.bestPoints}</td>
      <td><button onclick="showSeason('${id}')">عرض</button></td>
    </tr>`;
  }

  document.getElementById("seasonsTable").innerHTML = html;
}

// 🔍 عرض تفاصيل الموسم
window.showSeason = async function(id){
  const snap = await get(ref(db,"seasons/"+id));
  if(!snap.exists()) return;

  let s = snap.val();
  let html = "";

  s.top10.forEach((p,i)=>{
    html += `
    <tr>
      <td>${i+1}</td>
      <td>${p.name}</td>
      <td>${p.points}</td>
      <td>${p.league}</td>
      <td>${p.wins}</td>
      <td>${p.losses}</td>
    </tr>`;
  });

  document.getElementById("seasonDetails").innerHTML = html;
};

</script>

</body>
</html>
