<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🧑‍💻 لوحة الإدارة</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#loginBox {
  margin-top: 120px;
}

input {
  padding: 10px;
  margin: 8px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }
.orange { background: #f59e0b; }

.container {
  width: 95%;
  max-width: 1000px;
  margin: auto;
  display: none;
}

.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin: 20px 0;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

th {
  background: #020617;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2>🔐 دخول لوحة الإدارة</h2>
  <input type="password" id="pass" placeholder="كلمة السر">
  <br>
  <button class="green" onclick="login()">دخول</button>
</div>

<!-- 📊 DASHBOARD -->
<div class="container" id="dashboard">

<h2>🧑‍💻 لوحة التحكم</h2>

<button class="red" onclick="logout()">🚪 تسجيل خروج</button>

<!-- 🏁 الموسم -->
<button class="orange" onclick="endSeason()">🏁 إنهاء الموسم</button>
<button class="blue" onclick="newSeason()">🔄 بداية موسم جديد</button>

<!-- 📦 الموسم الحالي -->
<div class="card">
<h3>📦 الموسم الحالي</h3>
<div id="currentSeasonInfo">تحميل...</div>
</div>

<!-- 📊 Stats -->
<div class="cards">
  <div class="card">👥 اللاعبين<br><span id="playersCount">0</span></div>
  <div class="card">🎮 المباريات<br><span id="matchesCount">0</span></div>
  <div class="card">🏆 الأول حالياً<br><span id="bestPlayer">-</span></div>
  <div class="card">🔥 أعلى نقاط<br><span id="bestPoints">0</span></div>
</div>

<!-- ➕ لاعب -->
<div class="card">
<h3>➕ إضافة لاعب</h3>
<input id="newPlayer" placeholder="اسم اللاعب">
<button class="green" onclick="addPlayer()">إضافة</button>
</div>

<!-- 👥 اللاعبين -->
<h3>📊 اللاعبين</h3>
<table>
<thead>
<tr>
<th>الاسم</th>
<th>النقاط</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="playersTable"></tbody>
</table>

<!-- 🏆 أرشيف المواسم -->
<h3>📦 أرشيف المواسم</h3>
<table>
<thead>
<tr>
<th>الموسم</th>
<th>الأول</th>
<th>النقاط</th>
<th>التاريخ</th>
</tr>
</thead>
<tbody id="seasonsTable"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getDatabase, ref, get, set, remove, update, push
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain: "garag-system.firebaseapp.com",
  databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
  projectId: "garag-system",
  storageBucket: "garag-system.firebasestorage.app",
  messagingSenderId: "330947022055",
  appId: "1:330947022055:web:ce96293502f40d2645a642"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const PASSWORD = "88888888";

// 🔐 Login
window.login = function () {
  let pass = document.getElementById("pass").value;

  if (pass === PASSWORD) {
    localStorage.setItem("admin", "true");
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadAll();
  } else {
    alert("خطأ ❌");
  }
};

// 🚪 Logout
window.logout = function () {
  localStorage.removeItem("admin");
  location.reload();
};

// 🔒 auto login
if (localStorage.getItem("admin") === "true") {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  loadAll();
}

// 📊 تحميل كل شيء
async function loadAll() {
  loadPlayers();
  loadSeasons();
  loadStats();
}

// 📊 اللاعبين
async function loadPlayers() {
  const snap = await get(ref(db, "players"));
  if (!snap.exists()) return;

  let data = snap.val();
  let html = "";

  for (let name in data) {
    let p = data[name];

    html += `
    <tr>
      <td>${name}</td>
      <td><input id="p_${name}" value="${p.points}"></td>
      <td><button class="blue" onclick="updatePlayer('${name}')">تحديث</button></td>
      <td><button class="red" onclick="deletePlayer('${name}')">حذف</button></td>
    </tr>`;
  }

  document.getElementById("playersTable").innerHTML = html;
}

// 📦 أرشيف المواسم
async function loadSeasons() {
  const snap = await get(ref(db, "seasons"));
  if (!snap.exists()) return;

  let data = snap.val();
  let html = "";

  for (let id in data) {
    let s = data[id];

    html += `
    <tr>
      <td>${id}</td>
      <td>${s.bestPlayer}</td>
      <td>${s.bestPoints}</td>
      <td>${s.date}</td>
    </tr>`;
  }

  document.getElementById("seasonsTable").innerHTML = html;
}

// 📊 stats
async function loadStats() {
  const snap = await get(ref(db, "players"));
  if (!snap.exists()) return;

  let data = snap.val();

  let count = Object.keys(data).length;
  document.getElementById("playersCount").innerText = count;

  let best = "-";
  let bestP = 0;

  for (let p in data) {
    if (data[p].points > bestP) {
      bestP = data[p].points;
      best = p;
    }
  }

  document.getElementById("bestPlayer").innerText = best;
  document.getElementById("bestPoints").innerText = bestP;

  document.getElementById("currentSeasonInfo").innerText =
    "النظام يعمل بشكل طبيعي - النقاط لا تُصفّر";
}

// ➕ لاعب
window.addPlayer = async function () {
  let name = document.getElementById("newPlayer").value;
  if (!name) return;

  await set(ref(db, "players/" + name), {
    points: 0,
    wins: 0,
    losses: 0,
    streak: 0,
    league: 5
  });

  loadAll();
};

// ✏️ تحديث
window.updatePlayer = async function (name) {
  let points = document.getElementById("p_" + name).value;

  await update(ref(db, "players/" + name), {
    points: Number(points)
  });

  loadAll();
};

// 🗑️ حذف لاعب
window.deletePlayer = async function (name) {
  await remove(ref(db, "players/" + name));
  loadAll();
};

// 🏁 إنهاء الموسم (أرشفة فقط)
window.endSeason = async function () {

  const snap = await get(ref(db, "players"));
  if (!snap.exists()) return;

  let data = snap.val();

  let best = "-";
  let bestP = 0;

  for (let p in data) {
    if (data[p].points > bestP) {
      bestP = data[p].points;
      best = p;
    }
  }

  let seasonId = "Season_" + Date.now();

  await set(ref(db, "seasons/" + seasonId), {
    bestPlayer: best,
    bestPoints: bestP,
    date: new Date().toLocaleDateString()
  });

  alert("تم إنهاء الموسم وحفظه 📦");
  loadAll();
};

// 🔄 بداية موسم جديد (لا تصفير نقاط)
window.newSeason = function () {
  alert("تم بدء موسم جديد 🔄 (النقاط لم تتغير)");
  loadAll();
};

</script>

</body>
</html>
