<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧑‍💻 لوحة الإدارة</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    min-height: 100vh;
  }

  /* ── شاشة تسجيل الدخول ── */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .login-box {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .login-icon {
    width: 64px; height: 64px;
    background: rgba(245,158,11,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 1.2rem;
    border: 1px solid rgba(245,158,11,0.3);
  }

  .login-title {
    font-size: 20px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 6px;
  }

  .login-sub { font-size: 13px; color: #475569; margin-bottom: 1.5rem; }

  .pass-wrap {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .pass-wrap:focus-within { border-color: #f59e0b; }
  .pass-wrap span { font-size: 16px; flex-shrink: 0; }

  .pass-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 15px;
    padding: 13px 10px;
    font-family: Arial;
    letter-spacing: 3px;
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #d97706, #b45309);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-login:hover { opacity: 0.9; }
  .btn-login:active { transform: scale(0.98); }

  /* ── الداشبورد ── */
  #dashboard { display: none; }

  .header {
    background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
    border-bottom: 1px solid #1e293b;
    padding: 1.6rem 1rem 1.2rem;
    text-align: center;
    position: relative;
  }

  .header-title { font-size: clamp(18px,5vw,24px); font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
  .header-sub   { font-size: 13px; color: #475569; }

  .btn-logout {
    position: absolute;
    top: 1.2rem; left: 1rem;
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    color: #fca5a5;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-logout:hover { background: rgba(239,68,68,0.25); }

  /* ── الصفحة ── */
  .page { max-width: 680px; margin: auto; padding: 1.2rem 1rem 3rem; }

  /* ── إجراءات الموسم ── */
  .season-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .btn-season {
    padding: 14px 10px;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: clamp(13px,3.5vw,15px);
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-season:active { transform: scale(0.97); }
  .btn-end   { background: linear-gradient(135deg, #dc2626, #b91c1c); }
  .btn-new   { background: linear-gradient(135deg, #2563eb, #1d4ed8); }

  /* ── كروت الملخص ── */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .summary-box {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 1rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sum-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .sum-icon.blue   { background: rgba(59,130,246,0.15); }
  .sum-icon.yellow { background: rgba(234,179,8,0.15); }

  .sum-val  { font-size: 22px; font-weight: 700; color: #f1f5f9; line-height: 1; margin-bottom: 3px; }
  .sum-lbl  { font-size: 11px; color: #64748b; }

  /* ── كروت عامة ── */
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .card-header {
    background: #020617;
    border-bottom: 1px solid #334155;
    padding: 11px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-header-title { font-size: 14px; font-weight: 600; color: #94a3b8; }

  .card-body { padding: 1rem 1.1rem; }

  /* ── إضافة لاعب ── */
  .add-row {
    display: flex;
    gap: 8px;
  }

  .add-row input {
    flex: 1;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    font-family: Arial;
    transition: border-color 0.2s;
  }

  .add-row input:focus { border-color: #22c55e; }

  .btn-add {
    padding: 11px 18px;
    background: linear-gradient(135deg, #16a34a, #15803d);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .btn-add:hover { opacity: 0.9; }

  /* ── الجداول ── */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { width: 100%; border-collapse: collapse; min-width: 320px; }

  thead tr { background: #0f172a; }

  th {
    padding: 9px 12px;
    font-size: 11px;
    color: #475569;
    font-weight: 500;
    text-align: right;
    border-bottom: 1px solid #334155;
    white-space: nowrap;
  }

  td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid #1a2640;
    color: #cbd5e1;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(255,255,255,0.02); }

  /* حقل تعديل النقاط */
  .pts-input {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 7px;
    color: white;
    font-size: 13px;
    padding: 6px 10px;
    width: 80px;
    outline: none;
    font-family: Arial;
  }

  .pts-input:focus { border-color: #3b82f6; }

  /* أزرار الجدول */
  .tbl-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .tbl-btn:hover { opacity: 0.85; }
  .tbl-btn.upd { background: rgba(59,130,246,0.2);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
  .tbl-btn.del { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .tbl-btn.view{ background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }

  /* شارة الدوري */
  .league-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(99,102,241,0.15);
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.25);
  }

  /* win / loss */
  .win  { color: #22c55e; font-weight: 600; }
  .loss { color: #ef4444; font-weight: 600; }
</style>
</head>
<body>

<!-- ── شاشة الدخول ── -->
<div class="login-screen" id="loginBox">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">لوحة الإدارة</div>
    <div class="login-sub">أدخل كلمة المرور للمتابعة</div>
    <div class="pass-wrap">
      <span>🔑</span>
      <input type="password" id="pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn-login" onclick="login()">دخول</button>
  </div>
</div>

<!-- ── الداشبورد ── -->
<div id="dashboard">

  <div class="header">
    <button class="btn-logout" onclick="logout()">خروج ↩</button>
    <div class="header-title">🧑‍💻 لوحة التحكم</div>
    <div class="header-sub">إدارة دوري الدومينو</div>
  </div>

  <div class="page">

    <!-- إجراءات الموسم -->
    <div class="season-actions">
      <button class="btn-season btn-end" onclick="endSeason()">🏁 إنهاء الموسم</button>
      <button class="btn-season btn-new" onclick="newSeason()">🔄 موسم جديد</button>
    </div>

    <!-- ملخص -->
    <div class="summary-grid">
      <div class="summary-box">
        <div class="sum-icon blue">👥</div>
        <div>
          <div class="sum-val" id="playersCount">-</div>
          <div class="sum-lbl">إجمالي اللاعبين</div>
        </div>
      </div>
      <div class="summary-box">
        <div class="sum-icon yellow">🏆</div>
        <div>
          <div class="sum-val" id="bestPlayer" style="font-size:16px;">-</div>
          <div class="sum-lbl">المتصدر</div>
        </div>
      </div>
    </div>

    <!-- إضافة لاعب -->
    <div class="card">
      <div class="card-header">
        <span>➕</span>
        <span class="card-header-title">إضافة لاعب جديد</span>
      </div>
      <div class="card-body">
        <div class="add-row">
          <input id="newPlayer" placeholder="اسم اللاعب" onkeydown="if(event.key==='Enter') addPlayer()">
          <button class="btn-add" onclick="addPlayer()">إضافة</button>
        </div>
      </div>
    </div>

    <!-- جدول اللاعبين -->
    <div class="card">
      <div class="card-header">
        <span>👥</span>
        <span class="card-header-title">إدارة اللاعبين</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>النقاط</th>
              <th>تحديث</th>
              <th>حذف</th>
            </tr>
          </thead>
          <tbody id="playersTable"></tbody>
        </table>
      </div>
    </div>

    <!-- المواسم -->
    <div class="card">
      <div class="card-header">
        <span>📦</span>
        <span class="card-header-title">سجل المواسم</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>الموسم</th>
              <th>الأول</th>
              <th>النقاط</th>
              <th>تفاصيل</th>
            </tr>
          </thead>
          <tbody id="seasonsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- تفاصيل الموسم -->
    <div class="card">
      <div class="card-header">
        <span>🔍</span>
        <span class="card-header-title">تفاصيل الموسم المختار</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>الاسم</th>
              <th>النقاط</th>
              <th>الدوري</th>
              <th>فوز</th>
              <th>خسارة</th>
            </tr>
          </thead>
          <tbody id="seasonDetails"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain: "garag-system.firebaseapp.com",
  databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
  projectId: "garag-system",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const PASSWORD = "88888888";

window.login = function() {
  if (document.getElementById("pass").value === PASSWORD) {
    localStorage.setItem("admin","1");
    init();
  } else {
    document.getElementById("pass").style.borderColor = "#ef4444";
    setTimeout(() => document.getElementById("pass").style.borderColor = "", 1000);
  }
};

window.logout = function() {
  localStorage.removeItem("admin");
  location.reload();
};

if (localStorage.getItem("admin") === "1") init();

function init() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  loadAll();
}

async function loadAll() {
  loadPlayers();
  loadSeasons();
}

async function loadPlayers() {
  const snap = await get(ref(db,"players"));
  if (!snap.exists()) return;

  let data = snap.val();
  let html = "";
  let best = "-", bestP = 0;

  for (let n in data) {
    let p = data[n];
    if (p.points > bestP) { bestP = p.points; best = n; }

    html += `
      <tr>
        <td style="font-weight:600;color:#f1f5f9;">${n}</td>
        <td><input class="pts-input" id="p_${n}" value="${p.points}"></td>
        <td><button class="tbl-btn upd" onclick="updatePlayer('${n}')">تحديث</button></td>
        <td><button class="tbl-btn del" onclick="deletePlayer('${n}')">حذف</button></td>
      </tr>`;
  }

  document.getElementById("playersTable").innerHTML = html;
  document.getElementById("playersCount").innerText = Object.keys(data).length;
  document.getElementById("bestPlayer").innerText = best;
}

window.addPlayer = async function() {
  let name = document.getElementById("newPlayer").value.trim();
  if (!name) return;
  await set(ref(db,"players/"+name), { points:0, wins:0, losses:0, streak:0, league:5 });
  document.getElementById("newPlayer").value = "";
  loadAll();
};

window.updatePlayer = async function(name) {
  let val = document.getElementById("p_"+name).value;
  await update(ref(db,"players/"+name), { points: Number(val) });
  loadAll();
};

window.deletePlayer = async function(name) {
  if (!confirm(`حذف اللاعب "${name}"؟`)) return;
  await remove(ref(db,"players/"+name));
  loadAll();
};

function getLeague(p) {
  if (p >= 300) return 1;
  if (p >= 200) return 2;
  if (p >= 120) return 3;
  if (p >= 60)  return 4;
  return 5;
}

window.endSeason = async function() {
  const snap = await get(ref(db,"players"));
  if (!snap.exists()) return;

  let data = snap.val();
  let arr = Object.entries(data).map(([n,p]) => ({ name:n, ...p }));
  arr.sort((a,b) => b.points - a.points);

  for (let p of arr) {
    await update(ref(db,"players/"+p.name), { league: getLeague(p.points) });
  }

  let top10 = arr.slice(0,10).map(p => ({
    name: p.name,
    points: p.points,
    league: getLeague(p.points),
    wins: p.wins || 0,
    losses: p.losses || 0
  }));

  let seasonId = "Season_" + Date.now();
  await set(ref(db,"seasons/"+seasonId), {
    bestPlayer: arr[0].name,
    bestPoints: arr[0].points,
    top10,
    date: new Date().toLocaleDateString()
  });

  alert("تم إنهاء الموسم 🔥");
  loadAll();
};

window.newSeason = function() {
  alert("تم بدء موسم جديد");
};

async function loadSeasons() {
  const snap = await get(ref(db,"seasons"));
  if (!snap.exists()) return;

  let data = snap.val();
  let html = "";

  for (let id in data) {
    let s = data[id];
    html += `
      <tr>
        <td style="font-size:11px;color:#64748b;">${id}</td>
        <td style="font-weight:600;color:#f1f5f9;">${s.bestPlayer}</td>
        <td style="color:#fbbf24;font-weight:700;">${s.bestPoints}</td>
        <td><button class="tbl-btn view" onclick="showSeason('${id}')">عرض</button></td>
      </tr>`;
  }

  document.getElementById("seasonsTable").innerHTML = html;
}

window.showSeason = async function(id) {
  const snap = await get(ref(db,"seasons/"+id));
  if (!snap.exists()) return;

  let s = snap.val();
  let html = "";

  s.top10.forEach((p, i) => {
    html += `
      <tr>
        <td>${i + 1}</td>
        <td style="font-weight:600;color:#f1f5f9;">${p.name}</td>
        <td style="font-weight:700;">${p.points}</td>
        <td><span class="league-pill">الدوري ${p.league}</span></td>
        <td class="win">${p.wins}</td>
        <td class="loss">${p.losses}</td>
      </tr>`;
  });

  document.getElementById("seasonDetails").innerHTML = html;
  document.getElementById("seasonDetails").closest(".card").scrollIntoView({ behavior: "smooth" });
};
</script>
</body>
</html>
